name: Walkthrough Course
description: Story-driven course that follows a family through a real-world process, mapping each step to qc_core tables. Emphasis on narrative and live demos.
category: walkthrough
parameters:
  - name: topic
    description: The process being walked through (e.g., "Insurance Lifecycle", "Claim Processing")
  - name: family
    description: Training family name with _TRAIN_ suffix
    default: Garcia-TRAIN
  - name: tables
    description: Comma-separated list of primary QC tables involved

