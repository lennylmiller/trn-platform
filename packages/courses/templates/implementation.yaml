name: Implementation Course
description: Walk a QC administrator through setting up a domain area from scratch. Follows the narrative → demo → quiz rhythm with placeholders for screenshots and verification SQL.
category: implementation
parameters:
  - name: topic
    description: The domain area being taught (e.g., "Benefit Administration", "Claim Adjudication")
  - name: family
    description: Training family name with _TRAIN_ suffix
    default: Garcia-TRAIN
  - name: tables
    description: Comma-separated list of primary QC tables this course covers
  - name: actor
    description: Who the learner role-plays as
    default: QC Administrator

